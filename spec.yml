openapi: 3.0.0
info:
  title: Floor Control API
  description: An API for managing a "floor" in a push-to-talk radio group system.
  version: 1.0.0
servers:
  - url: http://localhost:8080
    description: Local dev server
paths:
  /groups:
    get:
      summary: List floors
      description: Get a list of groups currently active
      operationId: indexGroups
      tags:
        - Group Control
      responses:
        '200':
          description: A list of groups
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  /groups/{groupId}:
    get:
      summary: Get the group info
      description: Very similar to `/groups/{groupId}/floor`
      operationId: queryGroup
      tags:
        - Group Control
      parameters:
        - name: groupId
          in: path
          description: The ID of the group for which to obtain the floor.
          required: true
          schema:
            type: string
            example: "group-alpha-123"
      responses:
        '200':
          description: Info on the group
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Group'
        '404':
          description: Group not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Create a group
      description: Create a group with the given `groupId` as name
      operationId: createGroup
      tags:
        - Group Control
      parameters:
        - name: groupId
          in: path
          description: The ID of the group for which to obtain the floor.
          required: true
          schema:
            type: string
            example: "group-alpha-123"
      responses:
        '201':
          description: Group was created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        '401':
          description: Group already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Delete the group
      description: Try to delete the group `groupId`
      operationId: deleteGroup
      tags:
        - Group Control
      parameters:
        - name: groupId
          in: path
          description: The ID of the group for which to obtain the floor.
          required: true
          schema:
            type: string
            example: "group-alpha-123"
      responses:
        '200':
          description: Group was scheduled for deletion
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Group group-alpha-123 scheduled for deletion"
        '404':
          description: Group Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /groups/{groupId}/floor:
    get:
      summary: Get the floor holder
      description: Allows anyone to request the uid of the floor holder
      operationId: queryFloor
      tags:
        - Floor Control
      parameters:
        - name: groupId
          in: path
          description: The ID of the group for which to obtain the floor.
          required: true
          schema:
            type: string
            example: "group-alpha-123"
      responses:
        '200':
          description: Info on the group
          content:
            application/json:
              schema:
                type: object
                properties:
                  group:
                    $ref: '#/components/schemas/Group'
    post:
      summary: Obtain the Floor (Push to Talk)
      description: Allows a user to request and obtain the "floor" for a specified radio group. Only one user can hold the floor at a time.
      operationId: obtainFloor
      tags:
        - Floor Control
      parameters:
        - name: groupId
          in: path
          description: The ID of the group for which to obtain the floor.
          required: true
          schema:
            type: string
            example: "group-alpha-123"
      requestBody:
        description: UserRequest for the floor requesting the floor.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRequest'
      responses:
        '200':
          description: Successfully obtained the floor.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Floor obtained by user-456 for group group-alpha-123"
        '400':
          description: Bad Request - Missing or invalid userId.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: "Invalid request: userId is required"
        '409':
          description: Conflict - Floor is currently held by another user.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Floor is currently held by user-789 for group group-alpha-123"
  /groups/{groupId}/floor/{userId}:
    delete:
      summary: Release the Floor
      description: Allows a user to release the floor they are holding for a specified group.
      operationId: releaseFloor
      tags:
        - Floor Control
      parameters:
        - name: groupId
          in: path
          description: The ID of the group for which to release the floor.
          required: true
          schema:
            type: string
            example: "group-alpha-123"
        - name: userId
          in: path
          description: The ID of the user releasing the floor.
          required: true
          schema:
            type: string
            example: "user-456"
      responses:
        '200':
          description: Successfully released the floor.
          content:
            application/json:
              schema:
                type: object
                properties:
                  mesage:
                    type: string
                    example: "Floor released by user-456 for group group-alpha-123"
        '403':
          description: Forbidden - The requesting user does not hold the floor.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "User user-456 does not hold the floor for group group-alpha-123"
components:
  schemas:
    UserRequest:
      type: object
      required:
        - userId
      properties:
        userId:
          type: string
          description: The unique identifier for the user.
          example: "user-456"
        priority:
          type: integer
          description: The priority for the holder
          example: 1
    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          description: A human-readable error message.
    Group:
      type: object
      properties:
        held_by:
          type: string
          nullable: true
          description: The user currently holding a floor
