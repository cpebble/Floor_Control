services:
  api:
    image: cpebble/floor_control:latest
    build: .
    env_file: .env
    networks:
      - traefik_public
    labels:
      traefik.enable: true
      traefik.http.routers.floor_control.rule: Host(`${FCTL_URL:-fctl.local}`)
      traefik.http.services.floor_control.loadbalancer.server.port: 4000

networks:
  traefik_public:
    external: true
